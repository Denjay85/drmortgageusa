name: Website migration checks

on:
  pull_request:
    paths:
      - "app.py"
      - "render.yaml"
      - "sitemap.xml"
      - "update_blog.py"
      - "blog_posts/**"
      - "site/**"
      - "tests/**"
      - ".github/workflows/website-migration-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ENABLE_RATE_UPDATER: "0"
      ZAPIER_WEBHOOK_URL: "https://example.invalid/migration-test"

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate Flask integration
        run: python -m unittest tests.test_2026_redesign -v

      - name: Compile Flask application
        run: python -m py_compile app.py

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install front-end dependencies
        working-directory: site
        run: npm ci

      - name: Lint front end
        working-directory: site
        run: npm run lint

      - name: Build and test front end
        working-directory: site
        run: npm test

      - name: Validate production export
        run: |
          test -f site/dist/client/index.html
          test -f site/dist/client/tools.html
          test -f site/dist/client/blog.html
          test -f site/dist/client/dpa.html
          test -f site/dist/client/get-started.html
          python - <<'PY'
          from pathlib import Path

          roots = (Path("site/app"), Path("site/dist/client"))
          prohibited = (
              chr(8212),
              "&" + "mdash;",
              "&" + "#8212;",
              "&" + "#x2014;",
          )
          matches = []
          for root in roots:
              for path in root.rglob("*"):
                  if not path.is_file():
                      continue
                  try:
                      content = path.read_text(encoding="utf-8")
                  except UnicodeDecodeError:
                      continue
                  if any(token in content for token in prohibited):
                      matches.append(str(path))
          if matches:
              raise SystemExit(
                  "Prohibited punctuation found in public website output: "
                  + ", ".join(matches)
              )
          PY
