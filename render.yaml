databases:
  - name: drmortgageusa-db
    plan: free
    databaseName: drmortgageusa
    user: drmortgageusa

services:
  - type: web
    name: drmortgageusa
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: drmortgageusa-db
          property: connectionString
      - key: ADMIN_PASSWORD
        value: DrMortgage2026!
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: META_PIXEL_ID
        value: 444762220810129
      - key: META_CONVERSIONS_API_TOKEN
        sync: false
      - key: META_TEST_EVENT_CODE
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
